<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Learning Companion</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f0f0f;
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .badge {
        background: #1a1a2e;
        border: 1px solid #7F77DD;
        color: #AFA9EC;
        font-size: 12px;
        padding: 4px 14px;
        border-radius: 999px;
        margin-bottom: 24px;
      }

      h1 { font-size: 48px; font-weight: 700; text-align: center; margin-bottom: 20px; }
      h1 span { color: #7F77DD; }

      p {
        font-size: 18px;
        color: #888;
        text-align: center;
        max-width: 500px;
        line-height: 1.7;
        margin-bottom: 36px;
      }

      .buttons { display: flex; gap: 12px; }

      .btn-primary {
        background: #7F77DD;
        color: white;
        border: none;
        padding: 12px 28px;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
        font-weight: 500;
      }

      .btn-secondary {
        background: transparent;
        color: #888;
        border: 1px solid #333;
        padding: 12px 28px;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
      }

      .btn-primary:hover { background: #6a63c4; }
      .btn-secondary:hover { border-color: #555; color: #fff; }

      .stats {
        display: flex;
        gap: 48px;
        margin-top: 72px;
        padding-top: 36px;
        border-top: 1px solid #1f1f1f;
      }

      .stat-num { font-size: 28px; font-weight: 700; color: #7F77DD; }
      .stat-label { font-size: 13px; color: #555; margin-top: 4px; }
    </style>
  </head>
  <body>

    <div class="badge">AI-Powered Learning</div>

    <h1>Learn smarter with <span>AI</span> that remembers you</h1>

    <p>Your personal AI tutor that adapts to your pace, finds your weak spots, and builds a custom roadmap just for you.</p>

    <div class="buttons">
      <button class="btn-primary">Get started free</button>
      <button class="btn-secondary">See how it works</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num">10x</div>
        <div class="stat-label">Faster learning</div>
      </div>
      <div class="stat">
        <div class="stat-num">100%</div>
        <div class="stat-label">Personalized</div>
      </div>
      <div class="stat">
        <div class="stat-num">AI</div>
        <div class="stat-label">Powered memory</div>
      </div>
    </div>

  </body>
</html>
